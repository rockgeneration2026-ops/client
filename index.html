    <script>
      (function () {
        var settingsKey = "darkgorkha_client_settings";
        var defaultSettings = { theme: "system", reducedMotion: false, compactMode: false };
        var root = document.documentElement;

        function getSystemTheme() {
          try {
            return window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "default";
          } catch (error) {
            return "default";
          }
        }

        function resolveTheme(theme) {
          return theme === "system" ? getSystemTheme() : theme;
        }

        function applyTheme(settings) {
          var theme = resolveTheme(settings.theme || "system");
          root.classList.remove("theme-default", "theme-light", "theme-midnight", "theme-graphite", "reduce-motion", "compact-ui");
          root.classList.add(theme === "light" ? "theme-light" : theme === "midnight" ? "theme-midnight" : theme === "graphite" ? "theme-graphite" : "theme-default");

          if (settings.reducedMotion) {
            root.classList.add("reduce-motion");
          }

          if (settings.compactMode) {
            root.classList.add("compact-ui");
          }
        }

        try {
          var raw = localStorage.getItem(settingsKey);
          var parsed = raw ? JSON.parse(raw) : defaultSettings;
          applyTheme(Object.assign({}, defaultSettings, parsed));
        } catch (error) {
          applyTheme(defaultSettings);
        }
      })();
    </script>
